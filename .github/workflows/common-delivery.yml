name: Общая доставка

on:
  workflow_call:
    inputs:
      send_dev:
        required: false
        type: boolean
        default: true
      send_main:
        required: false
        type: boolean
        default: true
      rust_log:
        required: false
        type: string
        default: info
      environment:
        required: true
        type: string
      artifact_scope:
        required: false
        type: string
    secrets:
      TMDB_API_KEY:
        required: true
      BOT_TOKEN:
        required: true
      CHAT_ID:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    environment: ${{ inputs.environment }}

    env:
      CARGO_TERM_PROGRESS_WHEN: never
      RUST_LOG: ${{ inputs.rust_log }}

    steps:
      - name: Получение репозитория
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Подготовка окружения Rust
        uses: ./.github/actions/setup-rust

      - name: Восстановление истории фильмов
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: sent-movie-ids
          path: state

      - name: Восстановление истории сериалов
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: sent-tv-events
          path: state

      - name: Подготовка параметров истории для dev
        id: dev-history
        if: inputs.send_dev == true
        run: |
          echo "file=state/sent_movie_ids.txt" >> "$GITHUB_OUTPUT"
          echo "artifact=sent-movie-ids" >> "$GITHUB_OUTPUT"
          echo "tv_file=state/sent_tv_events.txt" >> "$GITHUB_OUTPUT"
          echo "tv_artifact=sent-tv-events" >> "$GITHUB_OUTPUT"

      - name: Отправка уведомлений в dev-чат
        if: inputs.send_dev == true
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }}
          HISTORY_FILE_PATH: ${{ steps.dev-history.outputs.file }}
          HISTORY_ARTIFACT_NAME: ${{ steps.dev-history.outputs.artifact }}
          TV_HISTORY_FILE_PATH: ${{ steps.dev-history.outputs.tv_file }}
          TV_HISTORY_ARTIFACT_NAME: ${{ steps.dev-history.outputs.tv_artifact }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: cargo run --quiet --release

      - name: Подготовка параметров истории для prod
        id: prod-history
        if: inputs.send_main == true
        run: |
          echo "file=state/sent_movie_ids.txt" >> "$GITHUB_OUTPUT"
          echo "artifact=sent-movie-ids" >> "$GITHUB_OUTPUT"
          echo "tv_file=state/sent_tv_events.txt" >> "$GITHUB_OUTPUT"
          echo "tv_artifact=sent-tv-events" >> "$GITHUB_OUTPUT"

      - name: Отправка уведомлений в основной чат
        if: inputs.send_main == true
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }}
          HISTORY_FILE_PATH: ${{ steps.prod-history.outputs.file }}
          HISTORY_ARTIFACT_NAME: ${{ steps.prod-history.outputs.artifact }}
          TV_HISTORY_FILE_PATH: ${{ steps.prod-history.outputs.tv_file }}
          TV_HISTORY_ARTIFACT_NAME: ${{ steps.prod-history.outputs.tv_artifact }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: cargo run --quiet --release

      - name: Публикация истории фильмов
        if: success() && (inputs.send_dev == true || inputs.send_main == true)
        uses: actions/upload-artifact@v4
        with:
          name: sent-movie-ids
          path: state/sent_movie_ids.txt
          overwrite: true

      - name: Публикация истории сериалов
        if: success() && (inputs.send_dev == true || inputs.send_main == true)
        uses: actions/upload-artifact@v4
        with:
          name: sent-tv-events
          path: state/sent_tv_events.txt
          overwrite: true
