name: Daily Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  fetch_digital_releases:
    runs-on: ubuntu-latest
    environment: Dev
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Установка Rust 2024
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Восстановление истории фильмов
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: sent-movie-ids
          path: state

      - name: Восстановление истории сериалов
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: sent-tv-events
          path: state

      - name: Инициализация state-артефактов
        run: |
          mkdir -p state

          missing_state=false
          if [ ! -f state/sent_movie_ids.txt ]; then
            : > state/sent_movie_ids.txt
            missing_state=true
          fi

          if [ ! -f state/sent_tv_events.txt ]; then
            : > state/sent_tv_events.txt
            missing_state=true
          fi

          if [ "$missing_state" = true ]; then
            echo "state artifacts missing, initialized empty state"
            echo "* state artifacts missing, initialized empty state" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Сборка и запуск бота
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }}
          TV_HISTORY_FILE_PATH: state/sent_tv_events.txt
          TV_HISTORY_ARTIFACT_NAME: sent-tv-events
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cargo run --release

      - name: Публикация истории фильмов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sent-movie-ids
          path: state/sent_movie_ids.txt
          overwrite: true

      - name: Публикация истории сериалов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sent-tv-events
          path: state/sent_tv_events.txt
          overwrite: true

      - name: summarize_run
        if: always()
        run: |
          echo "## Итоги суточного запуска" >> "$GITHUB_STEP_SUMMARY"
          echo "* Статус job: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "* Время завершения: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "* Версия Rust: $(rustc --version)" >> "$GITHUB_STEP_SUMMARY"
